<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1a" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Shield gradient -->
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>

    <!-- Accent line gradient -->
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0" />
      <stop offset="30%" stop-color="#6366f1" stop-opacity="1" />
      <stop offset="70%" stop-color="#6366f1" stop-opacity="1" />
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0" />
    </linearGradient>

    <!-- Left fade mask for pills -->
    <linearGradient id="fadeLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#080d1a" stop-opacity="1" />
      <stop offset="70%" stop-color="#080d1a" stop-opacity="0" />
    </linearGradient>

    <!-- Right fade mask for pills -->
    <linearGradient id="fadeRight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="30%" stop-color="#080d1a" stop-opacity="0" />
      <stop offset="100%" stop-color="#080d1a" stop-opacity="1" />
    </linearGradient>

    <!-- Top/bottom fade -->
    <linearGradient id="fadeTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080d1a" stop-opacity="1" />
      <stop offset="35%" stop-color="#080d1a" stop-opacity="0" />
      <stop offset="65%" stop-color="#080d1a" stop-opacity="0" />
      <stop offset="100%" stop-color="#080d1a" stop-opacity="1" />
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Subtle glow for icon -->
    <filter id="iconGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Purple radial ambient behind center -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0" />
    </radialGradient>

    <clipPath id="clipLeft">
      <rect x="0" y="0" width="320" height="640" />
    </clipPath>
    <clipPath id="clipRight">
      <rect x="960" y="0" width="320" height="640" />
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)" />

  <!-- Center purple ambient glow -->
  <rect width="1280" height="640" fill="url(#centerGlow)" />

  <!-- Grid lines -->
  <g opacity="0.035" stroke="#94a3b8" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80" />
    <line x1="0" y1="160" x2="1280" y2="160" />
    <line x1="0" y1="240" x2="1280" y2="240" />
    <line x1="0" y1="320" x2="1280" y2="320" />
    <line x1="0" y1="400" x2="1280" y2="400" />
    <line x1="0" y1="480" x2="1280" y2="480" />
    <line x1="0" y1="560" x2="1280" y2="560" />
    <line x1="160" y1="0" x2="160" y2="640" />
    <line x1="320" y1="0" x2="320" y2="640" />
    <line x1="480" y1="0" x2="480" y2="640" />
    <line x1="640" y1="0" x2="640" y2="640" />
    <line x1="800" y1="0" x2="800" y2="640" />
    <line x1="960" y1="0" x2="960" y2="640" />
    <line x1="1120" y1="0" x2="1120" y2="640" />
  </g>

  <!-- ── Left domain pills ─────────────────────────────────────── -->
  <g clip-path="url(#clipLeft)" font-family="'SF Mono','Fira Code',monospace" font-size="12" fill="#94a3b8">
    <!-- col 1 -->
    <g opacity="0.30">
      <rect x="24" y="96" width="152" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.75" />
      <text x="100" y="113" text-anchor="middle">tempmail.com</text>
      <rect x="24" y="134" width="164" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.75" />
      <text x="106" y="151" text-anchor="middle">guerrillamail.io</text>
      <rect x="24" y="172" width="144" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.75" />
      <text x="96" y="189" text-anchor="middle">mailinator.com</text>
      <rect x="24" y="210" width="132" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.75" />
      <text x="90" y="227" text-anchor="middle">throwam.com</text>
      <rect x="24" y="248" width="120" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.75" />
      <text x="84" y="265" text-anchor="middle">yopmail.com</text>
      <rect x="24" y="286" width="152" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.75" />
      <text x="100" y="303" text-anchor="middle">dispostable.com</text>
      <rect x="24" y="324" width="138" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.75" />
      <text x="93" y="341" text-anchor="middle">trashmail.net</text>
      <rect x="24" y="362" width="126" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.75" />
      <text x="87" y="379" text-anchor="middle">fakeinbox.com</text>
      <rect x="24" y="400" width="112" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.75" />
      <text x="80" y="417" text-anchor="middle">0-180.com</text>
      <rect x="24" y="438" width="148" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.75" />
      <text x="98" y="455" text-anchor="middle">spamgourmet.com</text>
      <rect x="24" y="476" width="134" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.75" />
      <text x="91" y="493" text-anchor="middle">10minutemail.com</text>
      <rect x="24" y="514" width="120" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.75" />
      <text x="84" y="531" text-anchor="middle">maildrop.cc</text>
    </g>
  </g>
  <!-- Fade overlay left -->
  <rect x="0" y="0" width="320" height="640" fill="url(#fadeLeft)" />

  <!-- ── Right domain pills ────────────────────────────────────── -->
  <g clip-path="url(#clipRight)" font-family="'SF Mono','Fira Code',monospace" font-size="12" fill="#94a3b8">
    <g opacity="0.30">
      <rect x="1104" y="96" width="152" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.75" />
      <text x="1180" y="113" text-anchor="middle">sharklasers.com</text>
      <rect x="1092" y="134" width="164" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.75" />
      <text x="1174" y="151" text-anchor="middle">getairmail.com</text>
      <rect x="1104" y="172" width="144" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.75" />
      <text x="1176" y="189" text-anchor="middle">trashmail.com</text>
      <rect x="1116" y="210" width="132" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.75" />
      <text x="1182" y="227" text-anchor="middle">spamex.com</text>
      <rect x="1128" y="248" width="120" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.75" />
      <text x="1188" y="265" text-anchor="middle">0-30.com</text>
      <rect x="1104" y="286" width="152" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.75" />
      <text x="1180" y="303" text-anchor="middle">tempinbox.com</text>
      <rect x="1110" y="324" width="138" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.75" />
      <text x="1179" y="341" text-anchor="middle">tempr.email</text>
      <rect x="1122" y="362" width="126" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.75" />
      <text x="1185" y="379" text-anchor="middle">burnermail.io</text>
      <rect x="1116" y="400" width="132" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.75" />
      <text x="1182" y="417" text-anchor="middle">mailnull.com</text>
      <rect x="1104" y="438" width="148" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.75" />
      <text x="1178" y="455" text-anchor="middle">guerrillamail.com</text>
      <rect x="1110" y="476" width="138" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.75" />
      <text x="1179" y="493" text-anchor="middle">emailondeck.com</text>
      <rect x="1122" y="514" width="126" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.75" />
      <text x="1185" y="531" text-anchor="middle">spamfree24.org</text>
    </g>
  </g>
  <!-- Fade overlay right -->
  <rect x="960" y="0" width="320" height="640" fill="url(#fadeRight)" />

  <!-- Top/bottom fade on the whole canvas -->
  <rect width="1280" height="640" fill="url(#fadeTop)" />

  <!-- ── Shield icon ───────────────────────────────────────────── -->
  <g filter="url(#iconGlow)" transform="translate(640,200)">
    <!-- Glow blob behind shield -->
    <ellipse cx="0" cy="10" rx="48" ry="44" fill="#4f46e5" opacity="0.18" />
    <!-- Shield path -->
    <path d="M0,-52 L44,-28 L44,10 Q44,50 0,68 Q-44,50 -44,10 L-44,-28 Z" fill="url(#shieldGrad)" opacity="0.15" />
    <path d="M0,-52 L44,-28 L44,10 Q44,50 0,68 Q-44,50 -44,10 L-44,-28 Z" fill="none" stroke="url(#shieldGrad)"
      stroke-width="2" opacity="0.9" />
    <!-- Check mark inside -->
    <polyline points="-18,8 -6,22 22,-10" fill="none" stroke="#a5b4fc" stroke-width="3.5" stroke-linecap="round"
      stroke-linejoin="round" />
  </g>


  <!-- ── Title ─────────────────────────────────────────────────── -->
  <text x="640" y="360" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="56"
    font-weight="700" fill="#f1f5f9" text-anchor="middle" letter-spacing="-1.5">
    disposable-domains
  </text>

  <!-- ── Subtitle ──────────────────────────────────────────────── -->
  <text x="640" y="404" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="19"
    font-weight="400" fill="#64748b" text-anchor="middle" letter-spacing="0.4">
    Community-sourced · deduplicated daily · one unified blocklist
  </text>

  <!-- ── Attribution ───────────────────────────────────────────── -->
  <text x="640" y="490" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15"
    font-weight="400" fill="#475569" text-anchor="middle">
    Project by <tspan fill="#a5b4fc" font-weight="500">Shrinath Nayak</tspan>
  </text>

</svg>