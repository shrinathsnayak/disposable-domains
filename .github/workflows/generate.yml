name: Generate domains.json

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate domains.json
        run: npm run generate:prod

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add domains.json README.md
          # Only commit when domains.json actually changed
          git diff --cached --quiet || git commit -m "chore: update domains.json [$(date -u +'%Y-%m-%d')]"
          git push
